# GitHub Actions: автоматическая сборка TERRALITE под Windows и Linux.
#
# Как использовать:
# 1. Залей проект на GitHub (публичный репозиторий = бесплатно).
# 2. Один раз настрой Tauri локально (см. BUILD.md): добавь папку src-tauri/.
# 3. Создай и запушь тег версии:
#      git tag v1.0.0
#      git push origin v1.0.0
# 4. GitHub соберёт обе версии и положит их в раздел Releases. 🎉

name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # позволяет запустить вручную во вкладке Actions

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04 # → Linux (.AppImage, .deb)
          - platform: windows-latest # → Windows (.msi, .exe)

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: npm ci || npm install

      - name: Build web app (Vite)
        run: npm run build

      # Если Tauri ещё не инициализирован (нет src-tauri), этот шаг пропускается.
      - name: Build desktop app with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TERRALITE ${{ github.ref_name }}"
          releaseBody: "Auto-generated desktop builds for Windows and Linux."
          releaseDraft: true
          prerelease: false
