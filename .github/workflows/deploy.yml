# 🚀 Автоматическая публикация сайта TERRALITE на GitHub Pages
#
# Что делает: при каждом пуше в ветку main собирает игру и публикует
# её как сайт на GitHub Pages — БЕСПЛАТНО.
#
# НАСТРОЙКА (один раз):
# 1. Залей проект на GitHub (публичный репозиторий).
# 2. В репозитории: Settings → Pages → "Build and deployment" →
#    Source = "GitHub Actions".
# 3. Запушь изменения — сайт сам соберётся и опубликуется.
#
# Готовый адрес: https://<твой_логин>.github.io/<имя_репозитория>/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Позволяет только один деплой одновременно.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build the site (Vite → single file)
        run: npm run build

      - name: Add .nojekyll (запретить обработку Jekyll)
        run: touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
